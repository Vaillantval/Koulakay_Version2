[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Séquence au démarrage :
# 1. Migrations DB
# 2. Création du superadmin initial (idempotent — ne fait rien si déjà existant)
# 3. Collecte des fichiers statiques (whitenoise)
# 4. Lancement de gunicorn
startCommand = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --threads 4 --worker-class gthread --timeout 120"
healthcheckPath = "/health/"
healthcheckTimeout = 120
restartPolicyType = "always"
restartPolicyMaxRetries = 10
