[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Séquence au démarrage :
# 1. Migrations DB
# 2. Création du superadmin initial (idempotent — ne fait rien si déjà existant)
# 3. Collecte des fichiers statiques (whitenoise)
# 4. Lancement de gunicorn
startCommand = "echo '=== MIGRATE ===' && python manage.py migrate --noinput && echo '=== WSGI IMPORT ===' && python -c 'import config.wsgi; print(\"WSGI OK\")' && echo '=== STARTING GUNICORN ===' && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120 --log-level debug --capture-output"
healthcheckPath = "/health/"
healthcheckTimeout = 120
restartPolicyType = "always"
restartPolicyMaxRetries = 10
