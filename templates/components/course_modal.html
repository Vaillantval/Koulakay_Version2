{% load i18n %}
<!-- ══════════════════════════════════════════════
     Modal d'inscription à un cours
     Utilisé par: home.html, courses.html
     Le contenu du cours (chapitres) est chargé en AJAX à l'ouverture.
     ══════════════════════════════════════════════ -->

<!-- Overlay -->
<div id="courseModal"
     class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden"
     style="background:rgba(20,6,0,0.65);backdrop-filter:blur(4px);"
     onclick="if(event.target===this) closeCourseModal()">

    <!-- Boîte de dialogue -->
    <div id="courseModalBox"
         class="relative w-full max-w-lg bg-white rounded-3xl overflow-hidden shadow-2xl
                transform scale-95 opacity-0 transition-all duration-300 flex flex-col"
         style="max-height:90vh;"
         onclick="event.stopPropagation()">

        <!-- Image du cours -->
        <div class="relative h-40 w-full shrink-0" style="background:linear-gradient(135deg,#C4853A,#7C3D0E);">
            <img id="modalImg" src="" alt="" class="w-full h-full object-cover hidden">
            <button onclick="closeCourseModal()"
                    class="absolute top-3 right-3 w-9 h-9 flex items-center justify-center rounded-full bg-black/40 text-white hover:bg-black/60 transition z-10">
                <span class="material-symbols-outlined text-xl">close</span>
            </button>
            <div class="absolute bottom-3 left-4">
                <span id="modalPriceBadge"
                      class="px-3 py-1 text-sm font-bold text-white rounded-full shadow"
                      style="background:rgba(20,6,0,0.7);backdrop-filter:blur(4px);"></span>
            </div>
        </div>

        <!-- Corps -->
        <div class="p-5 flex flex-col min-h-0">

            <!-- Titre + accès + prix (fixe) -->
            <div class="shrink-0">
                <h2 id="modalTitle" class="text-lg font-bold text-brand-900 mb-2 leading-snug"></h2>
                <div class="flex items-center gap-2 flex-wrap mb-4">
                    <span id="modalAccessPill"
                          class="inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold"></span>
                    <span id="modalPrice" class="text-base font-black text-brand-800"></span>
                </div>
            </div>

            <!-- En-tête Programme (fixe) -->
            <div class="shrink-0 flex items-center justify-between mb-2">
                <p class="text-xs font-bold text-brand-500 uppercase tracking-wide">{% trans "Programme du cours" %}</p>
                <span id="modalChapCount" class="text-xs text-brand-400"></span>
            </div>

            <!-- Contenu scrollable (chapitres) -->
            <div id="modalContent"
                 class="flex-1 min-h-0 overflow-y-auto rounded-xl border border-brand-100 mb-4"
                 style="max-height:34vh;">
            </div>

            <!-- Boutons (fixe) -->
            <div class="shrink-0 flex flex-col gap-2">
                <form id="modalEnrollForm" method="POST" action="">
                    {% csrf_token %}
                    <button type="submit" class="w-full kl-btn-cta kl-shine-btn py-3 font-bold rounded-xl text-base">
                        <span class="kl-shine-label">
                            <span class="material-symbols-outlined align-middle mr-1 text-lg" style="vertical-align:-3px;">payment</span>
                            {% trans "Procéder au paiement" %}
                        </span>
                    </button>
                </form>
                <a id="modalDetailsLink" href="#"
                   class="w-full text-center py-2.5 border-2 border-brand-300 text-brand-700 font-semibold rounded-xl hover:bg-brand-50 transition text-sm">
                    <span class="material-symbols-outlined align-middle mr-1 text-lg" style="vertical-align:-3px;">info</span>
                    {% trans "Plus de détails" %}
                </a>
            </div>

        </div>
    </div>
</div>

<style>
/* Reflet lumineux glissant sur « Procéder au paiement » (comme le bouton Payer du checkout) */
.kl-shine-btn { position: relative; overflow: hidden; }
.kl-shine-btn .kl-shine-label { position: relative; z-index: 1; }
.kl-shine-btn::after {
    content: '';
    position: absolute; top: 0; left: -75%;
    width: 50%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.45), transparent);
    transform: skewX(-20deg);
    animation: kl-btn-shine 3s ease-in-out infinite;
    z-index: 0;
}
@keyframes kl-btn-shine { 0% { left: -75%; } 55% { left: 130%; } 100% { left: 130%; } }
@media (prefers-reduced-motion: reduce) { .kl-shine-btn::after { animation: none; } }

/* Accordéon chapitres */
.kl-ch + .kl-ch { border-top: 1px solid #F3EDE8; }
.kl-ch-row { transition: background 0.15s; }
.kl-ch-row:hover { background: #FBF7F4; }
.kl-ch-icon { transition: transform 0.25s; }

/* dark mode */
html.dark #courseModalBox .border-brand-100 { border-color: rgba(23,197,216,0.15) !important; }
html.dark #courseModalBox .border-brand-300 { border-color: rgba(23,197,216,0.3) !important; }
html.dark #courseModalBox .hover\:bg-brand-50:hover { background: rgba(23,197,216,0.12) !important; }
html.dark #modalContent { border-color: rgba(23,197,216,0.15) !important; }
html.dark #modalContent .text-brand-800 { color: #EDF0F7 !important; }
html.dark #modalContent .text-brand-600 { color: #9bb3c0 !important; }
html.dark .kl-ch + .kl-ch { border-color: rgba(23,197,216,0.1) !important; }
html.dark .kl-ch-row:hover { background: rgba(23,197,216,0.07) !important; }
</style>

<script>
function klEscapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, function (c) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
}

function klRenderChapters(chapters) {
    var box = document.getElementById('modalContent');
    if (!chapters || !chapters.length) {
        box.innerHTML = '<p class="text-xs text-brand-400 italic text-center py-8">{% trans "Contenu bientôt disponible" %}</p>';
        return;
    }
    var html = '';
    chapters.forEach(function (ch, i) {
        var cnt = (ch.children || []).length;
        var lessons = (ch.children || []).map(function (l) {
            return '<li class="flex items-center gap-2 px-3 py-1.5 text-xs text-brand-600">' +
                   '<span class="material-symbols-outlined text-brand-300" style="font-size:14px;">play_circle</span>' +
                   '<span class="truncate">' + klEscapeHtml(l.name) + '</span></li>';
        }).join('');
        html +=
        '<div class="kl-ch">' +
          '<button type="button" class="kl-ch-row w-full flex items-center justify-between gap-2 px-3 py-2.5 text-left">' +
            '<span class="flex items-center gap-2 min-w-0">' +
              '<span class="shrink-0 w-6 h-6 rounded-md flex items-center justify-center text-white text-xs font-bold" style="background:#C4853A;">' + (i + 1) + '</span>' +
              '<span class="text-sm font-semibold text-brand-800 truncate">' + klEscapeHtml(ch.name) + '</span>' +
            '</span>' +
            '<span class="flex items-center gap-1.5 shrink-0">' +
              (cnt ? '<span class="text-xs text-brand-400">' + cnt + ' {% trans "leçon" %}' + (cnt > 1 ? 's' : '') + '</span>' : '') +
              '<span class="material-symbols-outlined kl-ch-icon text-brand-400" style="font-size:18px;">expand_more</span>' +
            '</span>' +
          '</button>' +
          '<ul class="kl-ch-body hidden pb-1">' + (lessons || '<li class="px-3 py-1.5 text-xs text-brand-400 italic">{% trans "Contenu à venir" %}</li>') + '</ul>' +
        '</div>';
    });
    box.innerHTML = html;
    box.querySelectorAll('.kl-ch-row').forEach(function (row) {
        row.addEventListener('click', function () {
            var body = this.nextElementSibling;
            var icon = this.querySelector('.kl-ch-icon');
            body.classList.toggle('hidden');
            if (icon) icon.style.transform = body.classList.contains('hidden') ? '' : 'rotate(180deg)';
        });
    });
}

// Ouvrir le modal — les URLs sont passées directement depuis les data-attrs du bouton
function openCourseModal(enrollUrl, detailsUrl, name, desc, price, imgUrl, accessDuration, currency) {
    document.getElementById('modalTitle').textContent = name;

    // Prix
    var displayCurrency = currency || '{{ site_currency|default:"USD" }}';
    var priceNum = parseFloat(price);
    var priceFormatted = (priceNum % 1 === 0) ? priceNum.toFixed(0) : priceNum.toFixed(2);
    var priceText = (priceNum === 0 || isNaN(priceNum))
        ? '{% trans "Gratuit" %}'
        : priceFormatted + ' ' + displayCurrency;
    document.getElementById('modalPrice').textContent = priceText;
    document.getElementById('modalPriceBadge').textContent = priceText;

    // Badge accès (pill discret)
    var pill = document.getElementById('modalAccessPill');
    if (!accessDuration || accessDuration === 'null' || accessDuration === '') {
        pill.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-brand-50 text-brand-600 border border-brand-100';
        pill.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;">all_inclusive</span>{% trans "Accès à vie" %}';
    } else {
        pill.className = 'inline-flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-semibold bg-amber-50 text-amber-700 border border-amber-200';
        pill.innerHTML = '<span class="material-symbols-outlined" style="font-size:14px;">timer</span>' + klEscapeHtml(accessDuration) + " {% trans "d'accès" %}";
    }

    // Image
    var img = document.getElementById('modalImg');
    if (imgUrl) { img.src = imgUrl; img.alt = name; img.classList.remove('hidden'); }
    else { img.classList.add('hidden'); }

    // URLs
    document.getElementById('modalEnrollForm').action = enrollUrl;
    document.getElementById('modalDetailsLink').href = detailsUrl;

    // Contenu du cours — chargé à la demande
    var box = document.getElementById('modalContent');
    var countEl = document.getElementById('modalChapCount');
    box.innerHTML = '<p class="text-xs text-brand-400 text-center py-8">{% trans "Chargement du programme…" %}</p>';
    countEl.textContent = '';
    var contentUrl = detailsUrl.replace('/course_details/', '/course_content/');
    fetch(contentUrl, { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
        .then(function (r) { return r.json(); })
        .then(function (d) {
            klRenderChapters(d.chapters);
            if (d.nb_chapters) {
                countEl.textContent = d.nb_chapters + ' chap.' + (d.nb_lessons ? ' · ' + d.nb_lessons + ' {% trans "leçons" %}' : '');
            }
        })
        .catch(function () {
            box.innerHTML = '<p class="text-xs text-brand-400 text-center py-8">{% trans "Programme indisponible pour le moment." %}</p>';
        });

    // Afficher avec animation
    var modal = document.getElementById('courseModal');
    var modalBox = document.getElementById('courseModalBox');
    modal.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(function () {
        modalBox.style.transform = 'scale(1)';
        modalBox.style.opacity = '1';
    });
}

function closeCourseModal() {
    var box = document.getElementById('courseModalBox');
    box.style.transform = 'scale(0.95)';
    box.style.opacity = '0';
    setTimeout(function () {
        document.getElementById('courseModal').classList.add('hidden');
        document.body.style.overflow = '';
    }, 280);
}

document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeCourseModal();
});
</script>
